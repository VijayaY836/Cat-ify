<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 220px;
        font-family: system-ui, sans-serif;
        padding: 16px;
        text-align: center;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }
      button {
        width: 100%;
        padding: 10px;
        font-size: 14px;
        border: none;
        border-radius: 8px;
        background: #ff7a59;
        color: white;
        cursor: pointer;
      }
      button:hover {
        background: #ff653e;
      }
      p {
        font-size: 11px;
        color: #666;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h1>🐱 Cat-ify</h1>
    <button id="reshuffle">Re-shuffle Cats</button>
    <p>Images are auto-replaced when the page loads. Click above to fetch new random cats without reloading.</p>
    <script src="popup.js"></script>
  </body>
</html>
